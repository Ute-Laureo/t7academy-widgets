<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rangliste</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap");
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Open Sans',sans-serif;background:transparent;color:#f0f0f0;width:100%;}
.rl-wrap{background:#080f1e;border:1.5px solid rgba(0,229,255,.2);border-radius:12px;padding:14px 12px 18px;width:100%;overflow:hidden;}
.rl-header{text-align:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(0,229,255,.1);}
.rl-title{font-weight:800;font-size:16px;letter-spacing:.06em;text-transform:uppercase;color:#fff;}
.rl-sub{font-size:9px;color:rgba(0,229,255,.55);font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-top:2px;}
.view-toggle{display:flex;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:3px;margin-bottom:10px;gap:3px;}
.vt-btn{flex:1;padding:7px 6px;border-radius:6px;border:none;font-family:'Open Sans',sans-serif;font-weight:700;font-size:9px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;color:rgba(255,255,255,.3);background:transparent;}
.vt-btn.active{background:rgba(0,229,255,.12);color:#00E5FF;box-shadow:0 0 0 1px rgba(0,229,255,.25);}
.rank-list{display:flex;flex-direction:column;gap:4px;}
.rank-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:7px 9px;}
.rank-num{font-weight:800;font-size:13px;font-style:normal;color:rgba(255,255,255,.18);min-width:18px;text-align:center;flex-shrink:0;}
.r-avatar{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;width:30px;height:30px;}
.rank-name{flex:1;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-val{font-weight:800;font-size:11px;color:#00E5FF;white-space:nowrap;flex-shrink:0;}
.loading{text-align:center;color:rgba(255,255,255,.2);padding:30px 0;font-size:11px;}
.error{text-align:center;color:#FF6B6B;padding:20px 0;font-size:11px;}
</style>
</head>
<body>
<div class="rl-wrap">
  <div class="rl-header">
    <div class="rl-title">🏆 Rangliste</div>
    <div class="rl-sub">Top Members · T7 Academy</div>
  </div>
  <div class="view-toggle">
    <button class="vt-btn active" id="vt-xp" onclick="setView('xp')">⚡ XP Rangliste</button>
    <button class="vt-btn" id="vt-weeks" onclick="setView('weeks')">📅 Wochen Mitglied</button>
  </div>
  <div id="rankList"><div class="loading">Lade&hellip;</div></div>
</div>
<script>
var SB_URL='https://qajjuhjmrtuomwrbxmpz.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhamp1aGptcnR1b213cmJ4bXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTMzNTksImV4cCI6MjA5MDAyOTM1OX0.4tyFG-e2IIh0Iwze7TQorfRF7DqUQkGBpeRgCcMkFC4';
var LIMIT=20;
var AC=[['#003d5c','#00E5FF'],['#064e3b','#34d399'],['#3b1e5f','#c4b5fd'],['#1e3a5f','#93c5fd'],['#7f1d1d','#fca5a5'],['#1c3a2e','#86efac'],['#4a1d2f','#f9a8d4'],['#1e3a1e','#bbf7d0'],['#2d2000','#fde68a'],['#1a1a3e','#a5b4fc']];
function ini(n){if(!n)return'?';return n.split(/\s+/).map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}
function acIdx(name){return name?(name.charCodeAt(0)+name.length)%AC.length:0;}

var allPlayers=[];
var currentView='xp';

function setView(v){
  currentView=v;
  document.getElementById('vt-xp').className='vt-btn'+(v==='xp'?' active':'');
  document.getElementById('vt-weeks').className='vt-btn'+(v==='weeks'?' active':'');
  if(allPlayers.length)render();
}
window.setView=setView;

function load(){
  var nowMs=Date.now();

  var playersP=fetch(SB_URL+'/rest/v1/players?select=player_name,total_xp&order=total_xp.desc&limit='+LIMIT,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){return r.json();}).catch(function(){return[];});

  var membersP=fetch(SB_URL+'/rest/v1/members?select=email,name,bm_joined_at&limit=200',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){return r.json();}).catch(function(){return[];});

  Promise.all([playersP,membersP]).then(function(res){
    var players=res[0]||[];
    var members=res[1]||[];

    // player_name is display name — match to members.name
    var joinedByName={};
    members.forEach(function(m){
      if(m.name&&m.bm_joined_at)joinedByName[m.name]=m.bm_joined_at;
    });

    allPlayers=players.map(function(p){
      var name=p.player_name||'Unbekannt';
      var joinedTs=joinedByName[name]||null;
      var totalWeeks=joinedTs?Math.floor((nowMs-joinedTs)/(7*86400000)):0;
      return{player_name:name,total_xp:Number(p.total_xp||0),total_weeks:totalWeeks};
    });

    if(!allPlayers.length){document.getElementById('rankList').innerHTML='<div class="loading">Noch keine Eintr&auml;ge.</div>';return;}
    render();
  }).catch(function(){document.getElementById('rankList').innerHTML='<div class="error">Fehler beim Laden</div>';});
}

function render(){
  var isWeeks=currentView==='weeks';
  var sorted=allPlayers.slice().sort(function(a,b){return isWeeks?b.total_weeks-a.total_weeks:b.total_xp-a.total_xp;});
  var med=['🥇','🥈','🥉'];
  var rows=sorted.map(function(p,i){
    var rank=i+1;
    var name=p.player_name;
    var ai=acIdx(name);
    var val=isWeeks?p.total_weeks+' Woche'+(p.total_weeks===1?'':'n'):p.total_xp.toLocaleString('de-AT')+' XP';
    return '<div class="rank-row">'+
      '<div class="rank-num" style="'+(rank===1?'color:#00E5FF':rank===2?'color:rgba(200,200,220,.7)':rank===3?'color:#FF9500':'')+'">'+(rank<=3?med[rank-1]:rank)+'</div>'+
      '<div class="r-avatar" style="background:'+AC[ai][0]+';color:'+AC[ai][1]+';border:2px solid '+(rank===1?'#00E5FF':rank===2?'rgba(200,200,220,.6)':rank===3?'rgba(255,149,0,.6)':AC[ai][1]+'55')+';">'+ini(name)+'</div>'+
      '<div class="rank-name">'+name+'</div>'+
      '<div class="rank-val">'+val+'</div>'+
    '</div>';
  }).join('');
  document.getElementById('rankList').innerHTML='<div class="rank-list">'+rows+'</div>';
}

load();
window.addEventListener('t7xpupdate',function(){load();});
setInterval(load,60000);
</script>
</body>
</html>
