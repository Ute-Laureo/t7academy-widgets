<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T7 Mobile Sheet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Open Sans',sans-serif;background:transparent}
@media(min-width:768px){#t7-fab,#t7-sheet-overlay{display:none!important}}

#t7-fab{position:fixed;bottom:24px;right:16px;z-index:9999;display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,#00E5FF,#0080FF);color:rgba(0,0,0,.85);font-family:'Open Sans',sans-serif;font-weight:800;font-size:13px;padding:10px 16px;border-radius:99px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,229,255,.5),0 2px 8px rgba(0,0,0,.3);white-space:nowrap;}
#t7-sheet-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .3s ease;}
#t7-sheet-overlay.open{opacity:1;pointer-events:all}
#t7-sheet{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#080f1e;border-radius:20px 20px 0 0;border-top:1.5px solid rgba(0,229,255,.35);max-height:82vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);}
#t7-sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:99px;margin:12px auto 0;flex-shrink:0;}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0;flex-shrink:0;}
.sheet-title{font-weight:800;font-size:15px;color:#fff;}
.sheet-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:16px;display:flex;align-items:center;justify-content:center;}
.sheet-tabs{display:flex;gap:6px;padding:10px 16px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.08);}
.sheet-tab{flex:1;padding:8px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);font-family:'Open Sans',sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-align:center;}
.sheet-tab.active{background:rgba(0,229,255,.15);color:#00E5FF;border-color:rgba(0,229,255,.4);}
.sheet-content{flex:1;overflow-y:auto;padding:14px 16px 24px;-webkit-overflow-scrolling:touch;min-height:300px;}

/* FORTSCHRITT */
.stat-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;text-align:center;}
.stat-num{font-weight:800;font-size:20px;color:#00E5FF;line-height:1}
.stat-label{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-top:3px;font-weight:600}

/* RANGLISTE */
.rl-tabs{display:flex;gap:6px;margin-bottom:12px}
.rl-tab{flex:1;padding:7px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-family:'Open Sans',sans-serif;font-weight:700;font-size:11px;cursor:pointer;text-align:center;}
.rl-tab.active{background:rgba(0,229,255,.12);color:#00E5FF;border-color:rgba(0,229,255,.35)}
.rank-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;margin-bottom:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);}
.rank-item.me{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.3)}
.rank-pos{font-weight:800;font-size:14px;color:rgba(255,255,255,.3);width:20px;text-align:center;flex-shrink:0;font-style:normal;}
.rank-pos.gold{color:#FFD700}.rank-pos.silver{color:#C0C8D0}.rank-pos.bronze{color:#CD7F32}
.rank-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#00E5FF,#0080FF);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:rgba(0,0,0,.8);flex-shrink:0}
.rank-avatar.me-av{box-shadow:0 0 0 2px #00E5FF}
.rank-name{flex:1;font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-val{font-size:13px;font-weight:800;color:#00E5FF;flex-shrink:0;white-space:nowrap;}
.loading-msg{text-align:center;padding:24px;color:rgba(255,255,255,.4);font-size:12px}
</style>
</head>
<body>
<button id="t7-fab" onclick="openSheet()">
  <span id="t7-fab-stars" style="display:none">⭐<span id="t7-fab-stars-num"></span></span>
  <span id="t7-fab-stars-sep" style="display:none;opacity:.5"> | </span>
  <span>⚡</span>
  <span id="t7-fab-xp">0 XP</span>
  <span style="opacity:.5"> | </span>
  <span id="t7-fab-streak">0 Wochen</span>
</button>
<div id="t7-sheet-overlay" onclick="closeSheet()"></div>
<div id="t7-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheet-title">Mein Fortschritt</div>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-tabs">
    <button class="sheet-tab active" id="tab-fort" onclick="switchTab('fort')">📊 Fortschritt</button>
    <button class="sheet-tab" id="tab-rang" onclick="switchTab('rang')">🏆 Rangliste</button>
  </div>
  <div class="sheet-content" id="sheet-content">
    <div class="loading-msg">Lade...</div>
  </div>
</div>
<script>
(function(){
'use strict';

var SB_URL='https://qajjuhjmrtuomwrbxmpz.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhamp1aGptcnR1b213cmJ4bXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTMzNTksImV4cCI6MjA5MDAyOTM1OX0.4tyFG-e2IIh0Iwze7TQorfRF7DqUQkGBpeRgCcMkFC4';
var LIMIT=20;

var state={name:'Spieler',email:null,totalXP:0,streak:0,weekXP:0,players:[],weeksByName:{},playerInited:false,activeTab:'fort',sheetOpen:false,fortLoaded:false,rangLoaded:false};

function sbH(){return{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};}

function getBMName(){var wins=[window];try{if(window.parent&&window.parent!==window)wins.push(window.parent);}catch(e){}try{if(window.top&&window.top!==window&&window.top!==window.parent)wins.push(window.top);}catch(e){}for(var wi=0;wi<wins.length;wi++){try{var w=wins[wi],bm=w.__BM_DATA__;if(bm){if(bm.intercom&&bm.intercom.bootProps&&bm.intercom.bootProps.name)return bm.intercom.bootProps.name;if(bm.member&&bm.member.name)return bm.member.name;}if(w.intercomSettings&&w.intercomSettings.name)return w.intercomSettings.name;}catch(e){}}return null;}
function getBMEmail(){var wins=[window];try{if(window.parent&&window.parent!==window)wins.push(window.parent);}catch(e){}try{if(window.top&&window.top!==window&&window.top!==window.parent)wins.push(window.top);}catch(e){}for(var wi=0;wi<wins.length;wi++){try{var w=wins[wi],bm=w.__BM_DATA__;if(bm&&bm.intercom&&bm.intercom.bootProps){var bp=bm.intercom.bootProps;if(bp.email)return bp.email;if(bp.userId)return bp.userId;}if(w.intercomSettings&&w.intercomSettings.email)return w.intercomSettings.email;if(bm&&bm.accessToken){try{var pl=JSON.parse(atob(bm.accessToken.split('.')[1]));if(pl&&pl.id&&pl.tokenType==='USER')return '__BMID__:'+pl.id;}catch(e){}}}catch(e){}}return null;}
function lookupEmailByBMIdDirect(bmId,cb){fetch(SB_URL+'/rest/v1/members?bm_id=eq.'+encodeURIComponent(bmId)+'&select=email,name&limit=1',{headers:sbH()}).then(function(r){return r.json();}).then(function(rows){if(rows&&rows.length&&rows[0].email)cb(rows[0].email,rows[0].name);else cb(null,null);}).catch(function(){cb(null,null);});}

function saveIdentity(email){try{localStorage.setItem('t7_player_identity',email);}catch(e){}}
function loadIdentity(){try{return localStorage.getItem('t7_player_identity')||null;}catch(e){return null;}}

function getWeekKey(d){var date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var day=date.getUTCDay()||7;date.setUTCDate(date.getUTCDate()+4-day);var yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));var week=Math.ceil((((date-yearStart)/86400000)+1)/7);return date.getUTCFullYear()+'-W'+week;}
function calcStreak(attempts){var weeks={};attempts.forEach(function(a){var ts=typeof a.attempted_at==='number'?a.attempted_at:parseInt(a.attempted_at)||0;if(ts)weeks[getWeekKey(new Date(ts))]=true;});var now=new Date(),streak=0;for(var i=0;i<52;i++){var wk=getWeekKey(new Date(now-i*7*86400000));if(weeks[wk])streak++;else if(i>0)break;}return streak;}
function calcWeekXP(attempts){var now=new Date();var startOfWeek=new Date(now);startOfWeek.setHours(0,0,0,0);startOfWeek.setDate(now.getDate()-((now.getDay()+6)%7));var t0=startOfWeek.getTime();var xp=0;attempts.forEach(function(a){var ts=typeof a.attempted_at==='number'?a.attempted_at:parseInt(a.attempted_at)||0;if(ts>=t0)xp+=(a.xp||0);});return xp;}

function loadPlayerData(email,cb){
  var pP=fetch(SB_URL+'/rest/v1/players?player_email=eq.'+encodeURIComponent(email)+'&select=total_xp',{headers:sbH()}).then(function(r){return r.json();}).catch(function(){return[];});
  var aP=fetch(SB_URL+'/rest/v1/attempts?player_email=eq.'+encodeURIComponent(email)+'&select=attempted_at,xp&order=attempted_at.asc',{headers:sbH()}).then(function(r){return r.json();}).catch(function(){return[];});
  Promise.all([pP,aP]).then(function(res){cb(res[0],res[1]);});
}
function loadRangData(cb){
  var pP=fetch(SB_URL+'/rest/v1/players?select=player_name,player_email,total_xp&order=total_xp.desc&limit='+LIMIT,{headers:sbH()}).then(function(r){return r.json();}).catch(function(){return[];});
  var mP=fetch(SB_URL+'/rest/v1/members?select=email,bm_joined_at&limit=200',{headers:sbH()}).then(function(r){return r.json();}).catch(function(){return[];});
  Promise.all([pP,mP]).then(function(res){cb(res[0],res[1]);});
}

function processPlayerData(playerRows,attRows){
  state.totalXP=(playerRows&&playerRows.length)?playerRows[0].total_xp||0:0;
  state.streak=calcStreak(attRows||[]);
  state.weekXP=calcWeekXP(attRows||[]);
}
function processRangData(players,members){
  state.players=players||[];
  var joinedByEmail={};
  (members||[]).forEach(function(m){if(m.email&&m.bm_joined_at)joinedByEmail[m.email]=m.bm_joined_at;});
  state.joinedByEmail=joinedByEmail;
}
function getPlayerWeeks(email){
  var ts=state.joinedByEmail&&email?state.joinedByEmail[email]||null:null;
  if(!ts)return 0;
  return Math.floor((Date.now()-ts)/(7*86400000));
}

function updateFAB(){
  document.getElementById('t7-fab-xp').textContent=state.totalXP+' XP';
  document.getElementById('t7-fab-streak').textContent=state.streak+' Woche'+(state.streak===1?'':'n');
}
function updateFABStars(email){
  if(!email)return;
  fetch(SB_URL+'/rest/v1/certifications?player_email=eq.'+encodeURIComponent(email)+'&select=stars&order=stars.desc&limit=1',{headers:sbH()})
  .then(function(r){return r.json();}).then(function(rows){
    if(rows&&rows.length&&rows[0].stars){
      document.getElementById('t7-fab-stars-num').textContent=rows[0].stars;
      document.getElementById('t7-fab-stars').style.display='inline';
      document.getElementById('t7-fab-stars-sep').style.display='inline';
    }
  }).catch(function(){});
}

function renderFort(){
  var streakDays='';
  for(var i=0;i<8;i++)streakDays+='<div style="flex:1;height:6px;border-radius:99px;background:'+(i<state.streak?'#00E5FF':'rgba(255,255,255,.1)')+'"></div>';
  return '<div class="stat-row">'+
    '<div class="stat-card"><div class="stat-num">'+state.totalXP+' XP</div><div class="stat-label">Gesamt XP</div></div>'+
    '<div class="stat-card"><div class="stat-num">+ '+state.weekXP+' XP</div><div class="stat-label">Diese Woche</div></div>'+
  '</div>'+
  '<div style="background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.18);border-radius:10px;padding:10px 12px;">'+
    '<div style="font-weight:800;font-size:12px;color:#00E5FF;margin-bottom:6px;">'+state.streak+' Woche'+(state.streak===1?'':'n')+' Streak</div>'+
    '<div style="display:flex;gap:3px;">'+streakDays+'</div>'+
  '</div>';
}

function renderRang(mode){
  mode=mode||'xp';
  var isWeeks=(mode==='weeks');
  var items=state.players.map(function(p){return{name:p.player_name,email:p.player_email,xp:p.total_xp||0,weeks:getPlayerWeeks(p.player_email)};});
  items.sort(function(a,b){return isWeeks?b.weeks-a.weeks:b.xp-a.xp;});
  var tabs='<div class="rl-tabs">'+
    '<button class="rl-tab'+(isWeeks?'':' active')+'" onclick="reRenderRang(\'xp\')">⚡ XP</button>'+
    '<button class="rl-tab'+(isWeeks?' active':'')+'" onclick="reRenderRang(\'weeks\')">📅 Wochen Mitglied</button>'+
  '</div>';
  var med=['🥇','🥈','🥉'];
  var rows=items.map(function(p,i){
    var rank=i+1;
    var name=p.name||'?';
    var initials=name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var isMe=(state.name&&name.split(' ')[0]===state.name.split(' ')[0]);
    var val=isWeeks?p.weeks+' Woche'+(p.weeks===1?'':'n'):p.xp+' XP';
    var posClass=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    return '<div class="rank-item'+(isMe?' me':'')+'">'+
      '<div class="rank-pos '+posClass+'">'+(rank<=3?med[rank-1]:rank)+'</div>'+
      '<div class="rank-avatar'+(isMe?' me-av':'')+'">'+initials+'</div>'+
      '<div class="rank-name">'+name+'</div>'+
      '<div class="rank-val">'+val+'</div>'+
    '</div>';
  }).join('');
  return tabs+'<div>'+rows+'</div>';
}

window.reRenderRang=function(mode){document.getElementById('sheet-content').innerHTML=renderRang(mode);};

window.openSheet=function(){
  state.sheetOpen=true;
  document.getElementById('t7-sheet').classList.add('open');
  document.getElementById('t7-sheet-overlay').classList.add('open');
  if(state.activeTab==='fort'&&!state.fortLoaded&&state.email)loadAndRenderFort();
  if(state.activeTab==='rang'&&!state.rangLoaded)loadAndRenderRang();
};
window.closeSheet=function(){
  state.sheetOpen=false;
  document.getElementById('t7-sheet').classList.remove('open');
  document.getElementById('t7-sheet-overlay').classList.remove('open');
};
window.switchTab=function(tab){
  state.activeTab=tab;
  document.getElementById('tab-fort').className='sheet-tab'+(tab==='fort'?' active':'');
  document.getElementById('tab-rang').className='sheet-tab'+(tab==='rang'?' active':'');
  document.getElementById('sheet-title').textContent=tab==='fort'?'Mein Fortschritt':'Rangliste';
  if(tab==='fort'){
    if(state.fortLoaded)document.getElementById('sheet-content').innerHTML=renderFort();
    else if(state.email)loadAndRenderFort();
  }else{
    if(state.rangLoaded)document.getElementById('sheet-content').innerHTML=renderRang('xp');
    else loadAndRenderRang();
  }
};

function loadAndRenderFort(){
  loadPlayerData(state.email,function(pRows,aRows){
    processPlayerData(pRows,aRows);state.fortLoaded=true;updateFAB();
    if(state.sheetOpen&&state.activeTab==='fort')document.getElementById('sheet-content').innerHTML=renderFort();
  });
}
function loadAndRenderRang(){
  loadRangData(function(players,attempts){
    processRangData(players,attempts);state.rangLoaded=true;
    if(state.sheetOpen&&state.activeTab==='rang')document.getElementById('sheet-content').innerHTML=renderRang('xp');
  });
}

function init(name,email){
  state.name=name;state.email=email;
  var parts=(name||'').split(' ');
  document.getElementById('sheet-title').textContent='Hey '+parts[0]+'!';
  loadPlayerData(email,function(pRows,aRows){
    processPlayerData(pRows,aRows);state.fortLoaded=true;updateFAB();
  });
  updateFABStars(email);
}

function tryInit(){
  var bmResult=getBMEmail();
  var bmName=getBMName();
  if(bmResult&&bmResult!=='unbekannt'){
    if(bmResult.indexOf('__BMID__:')===0){
      var bmId=bmResult.replace('__BMID__:','');
      var savedEmail=loadIdentity();
      if(savedEmail){
        fetch(SB_URL+'/rest/v1/members?email=eq.'+encodeURIComponent(savedEmail)+'&select=name&limit=1',{headers:sbH()}).then(function(r){return r.json();}).then(function(rows){init((rows&&rows.length&&rows[0].name)||savedEmail.split('@')[0],savedEmail);state.playerInited=true;}).catch(function(){init(savedEmail.split('@')[0],savedEmail);state.playerInited=true;});
        return true;
      }
      lookupEmailByBMIdDirect(bmId,function(email,name){if(email&&!state.playerInited){saveIdentity(email);init(name||email.split('@')[0],email);state.playerInited=true;}});
      return false;
    }
    saveIdentity(bmResult);init(bmName||bmResult.split('@')[0],bmResult);state.playerInited=true;return true;
  }
  var savedEmail=loadIdentity();
  if(savedEmail){
    fetch(SB_URL+'/rest/v1/members?email=eq.'+encodeURIComponent(savedEmail)+'&select=name&limit=1',{headers:sbH()}).then(function(r){return r.json();}).then(function(rows){init((rows&&rows.length&&rows[0].name)||savedEmail.split('@')[0],savedEmail);state.playerInited=true;}).catch(function(){init(savedEmail.split('@')[0],savedEmail);state.playerInited=true;});
    return true;
  }
  var wins=[window];try{if(window.parent&&window.parent!==window)wins.push(window.parent);}catch(e){}try{if(window.top&&window.top!==window&&window.top!==window.parent)wins.push(window.top);}catch(e){}
  var bmId=null;
  for(var wi=0;wi<wins.length;wi++){try{var w=wins[wi];var links=w.document.querySelectorAll('a[href*="/member/"]');for(var li=0;li<links.length;li++){var m=links[li].href.match(/\/member\/([A-Za-z0-9]{8,12})/);if(m){bmId=m[1];break;}}if(bmId)break;}catch(e){}}
  if(bmId){fetch(SB_URL+'/rest/v1/members?bm_id=eq.'+encodeURIComponent(bmId)+'&select=email,name&limit=1',{headers:sbH()}).then(function(r){return r.json();}).then(function(rows){if(rows&&rows.length&&rows[0].email&&!state.playerInited){saveIdentity(rows[0].email);init(rows[0].name||rows[0].email.split('@')[0],rows[0].email);state.playerInited=true;}}).catch(function(){});}
  return false;
}

window.addEventListener('t7xpupdate',function(){
  if(!state.email)return;
  loadPlayerData(state.email,function(pRows,aRows){
    processPlayerData(pRows,aRows);state.fortLoaded=true;updateFAB();
    if(state.sheetOpen&&state.activeTab==='fort')document.getElementById('sheet-content').innerHTML=renderFort();
  });
  if(state.sheetOpen&&state.activeTab==='rang')loadAndRenderRang();
});

if(!tryInit()){var _ret=0;var _retT=setInterval(function(){_ret++;if(tryInit()||_ret>=20)clearInterval(_retT);},500);}

var touchStart=0;
document.getElementById('t7-sheet').addEventListener('touchstart',function(e){touchStart=e.touches[0].clientY;},{passive:true});
document.getElementById('t7-sheet').addEventListener('touchend',function(e){if(e.changedTouches[0].clientY-touchStart>80)closeSheet();},{passive:true});

})();
</script>
</body>
</html>
