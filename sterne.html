<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sterne – T7 Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://db.onlinewebfonts.com/c/1140819bff120ecc7a6eaed55f1dd6ed?family=Garet+W05+Bold" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* THEMES */
[data-theme="dark"]{
  --bg:#080f1e;--surface:#0d1528;--surface2:#111c30;
  --border:rgba(0,229,255,.12);--accent:#00E5FF;--accent2:#1f80ff;--accent3:#1800ad;
  --text:#e8f4ff;--muted:rgba(232,244,255,.45);
  --nav-bg:#0a1628;--nav-border:rgba(0,229,255,.15);
  --card-title-bg:linear-gradient(90deg,#00E5FF,#1f80ff);--card-title-text:#080f1e;
  --search-bg:#1a2640;--btn-ghost-color:rgba(232,244,255,.45);
}
[data-theme="light"]{
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#e8eef5;
  --border:rgba(0,100,180,.15);--accent:#00E5FF;--accent2:#1f80ff;--accent3:#1800ad;
  --text:#0d1528;--muted:rgba(13,21,40,.5);
  --nav-bg:#ffffff;--nav-border:rgba(0,100,180,.15);
  --card-title-bg:#0080FF;--card-title-text:#ffffff;
  --search-bg:#ffffff;--btn-ghost-color:rgba(13,21,40,.5);
}

html,body{font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

/* TOP NAV */
.topnav{
  position:sticky;top:0;z-index:300;
  background:var(--nav-bg);
  border-bottom:1px solid var(--nav-border);
  padding:0 20px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.nav-logo img{height:36px;width:auto;}
.nav-links{display:flex;gap:2px;align-items:center;}
.nav-link{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;letter-spacing:.04em;text-decoration:none;transition:all .15s;}
.nav-link:hover{color:var(--text);background:rgba(128,128,128,.1);}
.nav-link.active{color:var(--accent);background:rgba(0,229,255,.08);}
.nav-right{display:flex;align-items:center;gap:8px;}
.theme-toggle{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);transition:all .15s;}
.theme-toggle:hover{color:var(--text);border-color:var(--accent);}
.nav-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#00E5FF,#1800ad);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#000;cursor:pointer;}

/* HERO */
.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:220px;
  border-bottom:1px solid var(--nav-border);
}
.hero-text{
  background:#00E5FF;
  padding:36px 28px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.hero h1{font-family:'Garet W05 Bold','Open Sans',sans-serif;font-size:36px;font-weight:900;color:#000;line-height:1.1;margin-bottom:10px;}
.hero h1 span{color:#fff;}
.hero p{font-size:13px;color:rgba(0,0,0,.7);line-height:1.6;}
.hero-image{
  background:url('https://ute-laureo.github.io/t7academy-widgets/Assets/Stars_Hero_Pic.jpg') center/cover no-repeat;
}
@media(max-width:600px){
  .hero{grid-template-columns:1fr;}
  .hero-image{height:180px;order:-1;}
  .hero-text{order:1;}
}

/* CONTROLS */
.controls{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;background:var(--surface);}
.search-wrap{position:relative;}
.search-wrap input{
  width:100%;padding:9px 16px 9px 38px;
  background:var(--search-bg);border:1.5px solid rgba(0,229,255,.35);
  border-radius:10px;color:var(--text);
  font-family:'Open Sans',sans-serif;font-size:13px;outline:none;transition:border .15s;
}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:rgba(232,244,255,.6);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.filter-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{padding:6px 16px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
.filter-btn.active,.filter-btn:hover{background:rgba(0,150,255,.1);border-color:var(--accent);color:var(--accent);}

/* GRID */
.grid{padding:16px;}
.star-group{margin-bottom:28px;}
.star-group-title{font-family:'Garet W05 Bold','Open Sans',sans-serif;font-size:18px;font-weight:900;color:var(--text);padding:10px 0 12px;border-bottom:2px solid var(--accent);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.star-group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15);}
.card-thumb{position:relative;aspect-ratio:16/9;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.play-icon{width:40px;height:40px;border-radius:50%;background:rgba(0,150,255,.2);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;flex-shrink:0;}
.play-icon::after{content:'';border-left:12px solid var(--accent);border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px;}
.card-stars{position:absolute;top:8px;left:8px;background:rgba(8,15,30,.85);border:1px solid rgba(255,200,0,.4);border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;color:#FFD700;z-index:2;}
.card-diff{position:absolute;top:8px;right:8px;border-radius:6px;padding:3px 7px;font-size:9px;font-weight:700;letter-spacing:.05em;z-index:2;}
.card-diff.easy{background:rgba(0,200,100,.15);color:#00C864;border:1px solid rgba(0,200,100,.25);}
.card-diff.medium{background:rgba(255,149,0,.15);color:#FF9500;border:1px solid rgba(255,149,0,.25);}
.card-diff.hard{background:rgba(255,59,59,.12);color:#FF6B6B;border:1px solid rgba(255,59,59,.2);}
.card-title-bar{background:var(--card-title-bg);padding:8px 12px;}
.card-title{font-family:'Garet W05 Bold','Open Sans',sans-serif;font-size:14px;font-weight:900;color:var(--card-title-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-cat{font-size:9px;color:rgba(8,15,30,.6);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
[data-theme="light"] .card-cat{color:rgba(255,255,255,.7);}

.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;}
.no-results{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(4,8,20,.97);overflow-y:auto;padding:20px;}
[data-theme="light"] .modal-overlay{background:rgba(240,244,248,.97);}
.modal-overlay.open{display:block;padding-top:76px;}
.modal-inner{max-width:740px;margin:0 auto;}
.modal-back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;margin-bottom:16px;padding:6px 0;letter-spacing:.05em;text-transform:uppercase;border:none;background:transparent;}
.modal-back:hover{color:var(--accent);}
.modal-back::before{content:'←';margin-right:4px;}
.video-wrap{border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:#000;margin-bottom:16px;}
.video-wrap iframe{width:100%;height:100%;border:none;display:block;}
.modal-title-bar{background:var(--card-title-bg);padding:12px 16px;border-radius:10px;margin-bottom:12px;}
.modal-title{font-family:'Garet W05 Bold','Open Sans',sans-serif;font-size:24px;color:var(--card-title-text);}
.modal-meta{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.meta-tag{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.meta-stars{background:rgba(255,200,0,.1);color:#FFD700;border:1px solid rgba(255,200,0,.25);}
.meta-cat{background:rgba(0,150,255,.1);color:var(--accent);border:1px solid rgba(0,150,255,.2);}
.meta-diff{background:rgba(128,128,128,.1);color:var(--muted);border:1px solid var(--border);}
.desc-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.desc-title{font-family:'Garet W05 Bold','Open Sans',sans-serif;font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.desc-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.desc-list li{display:flex;gap:10px;font-size:13px;color:var(--text);line-height:1.6;}
.desc-list li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:7px;}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="nav-logo">
    <a href="/"><img src="https://ute-laureo.github.io/t7academy-widgets/Assets/logo_t7academy.png" alt="T7 Academy"></a>
  </div>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="sterne.html" class="nav-link active">Sterne</a>
    <a href="sevens.html" class="nav-link">Sevens</a>
    <a href="challenges.html" class="nav-link">Challenges</a>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" title="Dark/Light Mode">🌙</button>
    <div class="nav-avatar" id="navAvatar">?</div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>Zeige Deine <span>Skills!</span></h1>
    <p>Schaue dir die Videos genau an. Übe zuerst langsam und dann schnell — immer rechts und links. Sei ehrlich mit Dir und Deiner Community!</p>
  </div>
  <div class="hero-image"></div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Suche Dein Sterne-Video…">
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-stars="all">Alle</button>
    <button class="filter-btn" data-stars="1">⭐ 1 Stern</button>
    <button class="filter-btn" data-stars="2">⭐⭐ 2 Sterne</button>
    <button class="filter-btn" data-stars="3">⭐⭐⭐ 3 Sterne</button>
    <button class="filter-btn" data-stars="4">⭐⭐⭐⭐ 4 Sterne</button>
    <button class="filter-btn" data-stars="5">⭐⭐⭐⭐⭐ 5 Sterne</button>
  </div>
</div>

<!-- GRID -->
<div id="grid" class="grid"><div class="loading">Lade Videos…</div></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-inner">
    <button class="modal-back" id="modalBack">Zurück</button>
    <div class="video-wrap" id="modalVideo"></div>
    <div class="modal-title-bar"><div class="modal-title" id="modalTitle"></div></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div id="modalDesc"></div>
  </div>
</div>

<script>
var SB_URL='https://qajjuhjmrtuomwrbxmpz.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhamp1aGptcnR1b213cmJ4bXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTMzNTksImV4cCI6MjA5MDAyOTM1OX0.4tyFG-e2IIh0Iwze7TQorfRF7DqUQkGBpeRgCcMkFC4';

// THEME
var theme=localStorage.getItem('t7_theme')||'dark';
document.documentElement.setAttribute('data-theme',theme);
document.getElementById('themeToggle').innerHTML=theme==='dark'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
document.getElementById('themeToggle').onclick=function(){
  theme=theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',theme);
  localStorage.setItem('t7_theme',theme);
  this.innerHTML=theme==='dark'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
};

// IDENTITY
function getBMEmail(){
  var wins=[window];
  try{if(window.parent&&window.parent!==window)wins.push(window.parent);}catch(e){}
  try{if(window.top&&window.top!==window)wins.push(window.top);}catch(e){}
  for(var i=0;i<wins.length;i++){
    try{
      var w=wins[i],bm=w.__BM_DATA__;
      if(bm&&bm.intercom&&bm.intercom.bootProps&&bm.intercom.bootProps.email)return bm.intercom.bootProps.email;
      if(w.intercomSettings&&w.intercomSettings.email)return w.intercomSettings.email;
      if(bm&&bm.accessToken){try{var pl=JSON.parse(atob(bm.accessToken.split('.')[1]));if(pl&&pl.id&&pl.tokenType==='USER'){var av=document.getElementById('navAvatar');if(av)av.textContent=pl.id.slice(0,2).toUpperCase();}}catch(e){}}
    }catch(e){}
  }
  return null;
}
var email=getBMEmail()||localStorage.getItem('t7_player_identity');
if(email){var av=document.getElementById('navAvatar');if(av)av.textContent=(email.slice(0,2)).toUpperCase();}

// VIDEOS
var allVideos=[];
var currentFilter='all';
var currentSearch='';
var thumbnailIndex={};

// Load thumbnail index first, then videos
fetch('https://ute-laureo.github.io/t7academy-widgets/Assets/thumbnail_index.json')
  .then(function(r){return r.json();})
  .then(function(idx){thumbnailIndex=idx;load();})
  .catch(function(){load();});

function diffClass(d){return d==='Einfach'?'easy':d==='Mittel'?'medium':d==='Schwierig'?'hard':'';}
function starsLabel(n){return Array(n+1).join('⭐');}

function load(){
  fetch(SB_URL+'/rest/v1/videos?stars=not.is.null&select=id,title_DE,vimeo_code,stars,category,difficulty,description&order=stars.asc,nr.asc',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){return r.json();})
  .then(function(rows){allVideos=rows||[];render();})
  .catch(function(){document.getElementById('grid').innerHTML='<div class="loading">Fehler beim Laden.</div>';});
}

function render(){
  var filtered=allVideos.filter(function(v){
    if(currentFilter!=='all'&&v.stars!=currentFilter)return false;
    if(currentSearch&&v.title_DE.toLowerCase().indexOf(currentSearch.toLowerCase())<0)return false;
    return true;
  });
  window._filteredVideos=filtered;
  if(!filtered.length){document.getElementById('grid').innerHTML='<div class="no-results">Keine Videos gefunden.</div>';return;}
  document.getElementById('grid').innerHTML=filtered.map(function(v,i){
    var diff=diffClass(v.difficulty);
    var vimeoId=v.vimeo_code?v.vimeo_code.split('/')[0]:'';
    var thumb='';
    var baseUrl='https://ute-laureo.github.io/t7academy-widgets/Assets/thumbnails/';
    var thumbUrl=vimeoId?baseUrl+vimeoId+'_':'' ;
    return '<div class="card" onclick="openVideo('+i+')">'+ 
      '<div class="card-thumb">'+
        (thumbUrl?'<img src="'+thumbUrl+'" alt="" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;" onerror="this.remove()">':'')+
        '<div class="play-icon"></div>'+
        '<div class="card-stars">'+starsLabel(v.stars)+'</div>'+
        (diff?'<div class="card-diff '+diff+'">'+v.difficulty+'</div>':'')+
      '</div>'+
      '<div class="card-title-bar">'+
        '<div class="card-title">'+v.title_DE+'</div>'+
        '<div class="card-cat">'+(v.category||'')+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

window.openVideo=function(idx){
  var v=(window._filteredVideos||allVideos)[idx];
  if(!v)return;
  var modal=document.getElementById('modal');
  document.getElementById('modalTitle').textContent=v.title_DE;
  var videoEl=document.getElementById('modalVideo');
  if(v.vimeo_code){
    var parts=v.vimeo_code.split('/');
    videoEl.innerHTML='<iframe src="https://player.vimeo.com/video/'+parts[0]+(parts[1]?'?h='+parts[1]:'')+'" allow="autoplay; fullscreen" allowfullscreen></iframe>';
    videoEl.style.display='block';
  }else{videoEl.style.display='none';videoEl.innerHTML='';}
  var meta='';
  if(v.stars)meta+='<span class="meta-tag meta-stars">'+starsLabel(v.stars)+' '+v.stars+' Stern'+(v.stars>1?'e':'')+'</span>';
  if(v.category)meta+='<span class="meta-tag meta-cat">'+v.category+'</span>';
  if(v.difficulty)meta+='<span class="meta-tag meta-diff">'+v.difficulty+'</span>';
  document.getElementById('modalMeta').innerHTML=meta;
  var descEl=document.getElementById('modalDesc');
  if(v.description){
    try{
      var steps=typeof v.description==='string'?JSON.parse(v.description):v.description;
      if(Array.isArray(steps)&&steps.length){
        descEl.innerHTML='<div class="desc-section"><div class="desc-title">Ablauf</div><ul class="desc-list">'+steps.map(function(s){return '<li>'+s+'</li>';}).join('')+'</ul></div>';
      }else{descEl.innerHTML='';}
    }catch(e){descEl.innerHTML='';}
  }else{descEl.innerHTML='';}
  modal.classList.add('open');
  modal.scrollTop=0;
  document.body.style.overflow='hidden';
};

document.getElementById('modalBack').onclick=function(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalVideo').innerHTML='';
  document.body.style.overflow='';
};
document.getElementById('filterBar').onclick=function(e){
  var btn=e.target.closest('.filter-btn');
  if(!btn)return;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  currentFilter=btn.dataset.stars;
  render();
};
document.getElementById('searchInput').addEventListener('input',function(){
  currentSearch=this.value;render();
});

// load() called after thumbnail index
</script>
</body>
</html>
