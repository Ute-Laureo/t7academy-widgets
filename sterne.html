<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sterne – T7 Academy</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Open+Sans:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080f1e;--surface:#0d1528;--surface2:#111c30;
  --border:rgba(0,229,255,.12);--accent:#00E5FF;--accent2:#0080FF;
  --text:#e8f4ff;--muted:rgba(232,244,255,.45);
}
html,body{font-family:'Open Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HERO */
.hero{background:linear-gradient(135deg,#0a1628 0%,#0d1f3c 100%);padding:32px 20px 24px;border-bottom:1px solid var(--border);}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);border-radius:99px;padding:4px 14px;font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:#fff;letter-spacing:-.01em;margin-bottom:6px;}
.hero h1 span{color:var(--accent);}
.hero p{font-size:13px;color:var(--muted);line-height:1.6;max-width:560px;}

/* FILTER */
.filter-bar{display:flex;gap:6px;padding:16px 20px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{padding:7px 18px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.03em;}
.filter-btn.active,.filter-btn:hover{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.35);color:var(--accent);}
.filter-btn.active{background:rgba(0,229,255,.15);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;}
.card:hover{border-color:rgba(0,229,255,.35);transform:translateY(-2px);}
.card-thumb{position:relative;aspect-ratio:16/9;background:#0a1628;}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.card-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a1628,#111c30);}
.play-icon{width:36px;height:36px;border-radius:50%;background:rgba(0,229,255,.15);border:1.5px solid rgba(0,229,255,.3);display:flex;align-items:center;justify-content:center;}
.play-icon::after{content:'';border-left:10px solid var(--accent);border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:2px;}
.card-stars{position:absolute;top:8px;left:8px;background:rgba(8,15,30,.85);border:1px solid rgba(255,200,0,.3);border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;color:#FFD700;}
.card-diff{position:absolute;top:8px;right:8px;border-radius:6px;padding:3px 7px;font-size:9px;font-weight:700;letter-spacing:.05em;}
.card-diff.easy{background:rgba(0,200,100,.12);color:#00C864;border:1px solid rgba(0,200,100,.2);}
.card-diff.medium{background:rgba(255,149,0,.12);color:#FF9500;border:1px solid rgba(255,149,0,.2);}
.card-diff.hard{background:rgba(255,59,59,.1);color:#FF6B6B;border:1px solid rgba(255,59,59,.2);}
.card-info{padding:10px 12px;}
.card-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-cat{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(4,8,20,.95);overflow-y:auto;padding:20px;}
.modal-overlay.open{display:block;}
.modal-inner{max-width:740px;margin:0 auto;}
.modal-back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;margin-bottom:16px;padding:6px 0;letter-spacing:.05em;text-transform:uppercase;}
.modal-back:hover{color:var(--accent);}
.modal-back::before{content:'←';}
.video-wrap{border-radius:12px;overflow:hidden;aspect-ratio:16/9;background:#000;margin-bottom:16px;}
.video-wrap iframe{width:100%;height:100%;border:none;display:block;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:#fff;margin-bottom:4px;}
.modal-meta{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.meta-tag{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.meta-stars{background:rgba(255,200,0,.1);color:#FFD700;border:1px solid rgba(255,200,0,.2);}
.meta-cat{background:rgba(0,229,255,.08);color:var(--accent);border:1px solid rgba(0,229,255,.15);}
.meta-diff{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.1);}
.desc-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.desc-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
.desc-list li{display:flex;gap:10px;font-size:13px;color:var(--text);line-height:1.6;}
.desc-list li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:7px;}
.no-video{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">⭐ Sterne</div>
  <h1>Zeige Deine <span>Skills!</span></h1>
  <p>Schaue dir die Videos genau an. Übe zuerst langsam und dann schnell — immer rechts und links!</p>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-stars="all">Alle</button>
  <button class="filter-btn" data-stars="1">⭐ 1 Stern</button>
  <button class="filter-btn" data-stars="2">⭐⭐ 2 Sterne</button>
  <button class="filter-btn" data-stars="3">⭐⭐⭐ 3 Sterne</button>
  <button class="filter-btn" data-stars="4">⭐⭐⭐⭐ 4 Sterne</button>
  <button class="filter-btn" data-stars="5">⭐⭐⭐⭐⭐ 5 Sterne</button>
</div>

<div id="grid" class="grid"><div class="loading">Lade Videos…</div></div>

<div class="modal-overlay" id="modal">
  <div class="modal-inner">
    <div class="modal-back" id="modalBack">Zurück</div>
    <div class="video-wrap" id="modalVideo"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div id="modalDesc"></div>
  </div>
</div>

<script>
var SB_URL='https://qajjuhjmrtuomwrbxmpz.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhamp1aGptcnR1b213cmJ4bXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTMzNTksImV4cCI6MjA5MDAyOTM1OX0.4tyFG-e2IIh0Iwze7TQorfRF7DqUQkGBpeRgCcMkFC4';

var allVideos=[];
var currentFilter='all';

function diffClass(d){return d==='Einfach'?'easy':d==='Mittel'?'medium':d==='Schwierig'?'hard':'';}
function starsLabel(n){return Array(n+1).join('⭐');}

function load(){
  fetch(SB_URL+'/rest/v1/videos?stars=not.is.null&select=id,title_DE,vimeo_code,stars,category,difficulty,description&order=stars.asc,nr.asc',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){return r.json();})
  .then(function(rows){
    allVideos=rows||[];
    render();
  }).catch(function(){
    document.getElementById('grid').innerHTML='<div class="loading">Fehler beim Laden.</div>';
  });
}

function render(){
  var filtered=currentFilter==='all'?allVideos:allVideos.filter(function(v){return v.stars==currentFilter;});
  if(!filtered.length){document.getElementById('grid').innerHTML='<div class="loading">Keine Videos gefunden.</div>';return;}
  window._filteredVideos=filtered;
  document.getElementById('grid').innerHTML=filtered.map(function(v,i){
    var diff=diffClass(v.difficulty);
    return '<div class="card" onclick="openVideo(' + i + ')">'+
      '<div class="card-thumb">'+
        '<div class="card-thumb-placeholder"><div class="play-icon"></div></div>'+
        '<div class="card-stars">'+starsLabel(v.stars)+'</div>'+
        (diff?'<div class="card-diff '+diff+'">'+v.difficulty+'</div>':'')+
      '</div>'+
      '<div class="card-info">'+
        '<div class="card-title">'+v.title_DE+'</div>'+
        '<div class="card-cat">'+(v.category||'')+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}
window.openVideo=function(idx){
  var v=(window._filteredVideos||allVideos)[idx];
  if(!v)return;
  var modal=document.getElementById('modal');
  document.getElementById('modalTitle').textContent=v.title_DE;
  var videoEl=document.getElementById('modalVideo');
  if(v.vimeo_code){
    var parts=v.vimeo_code.split('/');
    var vimeoId=parts[0],vimeoH=parts[1]||'';
    videoEl.innerHTML='<iframe src="https://player.vimeo.com/video/'+vimeoId+(vimeoH?'?h='+vimeoH:'')+'" allow="autoplay; fullscreen" allowfullscreen></iframe>';
    videoEl.style.display='block';
  } else {
    videoEl.style.display='none';
    videoEl.innerHTML='';
  }
  var meta='';
  if(v.stars)meta+='<span class="meta-tag meta-stars">'+starsLabel(v.stars)+' '+v.stars+' Stern'+(v.stars>1?'e':'')+'</span>';
  if(v.category)meta+='<span class="meta-tag meta-cat">'+v.category+'</span>';
  if(v.difficulty)meta+='<span class="meta-tag meta-diff">'+v.difficulty+'</span>';
  document.getElementById('modalMeta').innerHTML=meta;
  var descEl=document.getElementById('modalDesc');
  if(v.description){
    try{
      var steps=typeof v.description==='string'?JSON.parse(v.description):v.description;
      if(Array.isArray(steps)&&steps.length){
        descEl.innerHTML='<div class="desc-title">Ablauf</div><ul class="desc-list">'+steps.map(function(s){return '<li>'+s+'</li>';}).join('')+'</ul>';
      }else{descEl.innerHTML='';}
    }catch(e){descEl.innerHTML='';}
  }else{descEl.innerHTML='';}
  modal.classList.add('open');
  modal.scrollTop=0;
  document.body.style.overflow='hidden';
};
document.getElementById('modalBack').onclick=function(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalVideo').innerHTML='';
  document.querySelector('.no-video')&&document.querySelector('.no-video').remove();
  document.body.style.overflow='';
};

document.getElementById('filterBar').onclick=function(e){
  var btn=e.target.closest('.filter-btn');
  if(!btn)return;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  currentFilter=btn.dataset.stars;
  render();
};

load();
</script>
</body>
</html>
