<script src="https://ute-laureo.github.io/t7academy-widgets/t7-vimeo-tracker.js"></script>
<script>
(function(){
var SB_URL='https://qajjuhjmrtuomwrbxmpz.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhamp1aGptcnR1b213cmJ4bXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTMzNTksImV4cCI6MjA5MDAyOTM1OX0.4tyFG-e2IIh0Iwze7TQorfRF7DqUQkGBpeRgCcMkFC4';

// Category order definition
var CATEGORY_ORDER=['Jonglieren','Sitdowns','Sitdown','Ballannahme','Ballmitnahme','Passtechnik','Schusstechnik'];
var CATEGORY_DISPLAY={'Sitdown':'Sitdowns'};
// Difficulty order definition
var DIFF_ORDER=['Einfach','Mittel','Schwierig'];

// THEME
var theme=localStorage.getItem('t7_theme')||'dark';
document.documentElement.setAttribute('data-theme',theme);
document.body.setAttribute('data-theme',theme);
document.getElementById('themeToggle').innerHTML=theme==='dark'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
document.getElementById('themeToggle').onclick=function(){
  theme=theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',theme);
  document.body.setAttribute('data-theme',theme);
  localStorage.setItem('t7_theme',theme);
  this.innerHTML=theme==='dark'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
};

// Identity handled by WordPress

var allVideos=[],currentSearch='',thumbnailIndex={};

fetch('https://ute-laureo.github.io/t7academy-widgets/Assets/thumbnail_index.json?v='+Date.now())
  .then(function(r){return r.json();})
  .then(function(idx){thumbnailIndex=idx;load();})
  .catch(function(){load();});

function diffClass(d){return d==='Einfach'?'easy':d==='Mittel'?'medium':d==='Schwierig'?'hard':'';}
function starsLabel(n){return Array(n+1).join('⭐');}
function sevensLabel(n){return Array(n+1).join('7️⃣');}

// Convert a JSONB value (array | JSON-string | scalar | null) into a clean array of strings
function asArray(v){
  if(v==null)return[];
  var arr=v;
  if(typeof v==='string'){
    var t=v.trim();
    if(!t)return[];
    if(t.charAt(0)==='['||t.charAt(0)==='{'){
      try{arr=JSON.parse(t);}catch(e){arr=[t];}
    }else{arr=[t];}
  }
  if(!Array.isArray(arr))arr=[arr];
  return arr.map(function(x){return x==null?'':String(x).trim();}).filter(function(x){return x.length>0;});
}
function firstOf(v){var a=asArray(v);return a.length?a[0]:'';}
function subtitleHTML(v,cls){
  var sw=firstOf(v.so_what),ug=firstOf(v.ultimate_goal);
  var p='';
  if(sw)p+='<span class="vsub-so-what">'+sw+'</span>';
  if(sw)if(ug)p+='<span class="vsub-arrow" aria-hidden="true">→</span>';
  if(ug)p+='<span class="vsub-goal">'+ug+'</span>';
  return '<div class="'+(cls||'card-subtitles')+'">'+p+'</div>';
}

function load(){
  // Fetch sorted by category/difficulty: use nr.asc as secondary fallback within same difficulty
  fetch(SB_URL+'/rest/v1/videos?sevens=not.is.null&vimeo_code=not.is.null&select=id,title_DE,vimeo_code,sevens,category,difficulty,description,so_what,ultimate_goal&order=category.asc,nr.asc',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){return r.json();})
  .then(function(rows){allVideos=rows||[];updateAvailableOptions();render();})
  .catch(function(){document.getElementById('grid').innerHTML='<div class="loading">Fehler beim Laden.</div>';});
}

var likedVideos=JSON.parse(localStorage.getItem('t7_liked')||'{}');
var vorgemerkteVideos=JSON.parse(localStorage.getItem('t7_vormerken')||'{}');
var SVG_HEART='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
var SVG_BELL='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>';

window.toggleLike=function(id){
  likedVideos[id]=!likedVideos[id];
  if(!likedVideos[id])delete likedVideos[id];
  localStorage.setItem('t7_liked',JSON.stringify(likedVideos));
  var btn=document.querySelector('#card-'+id+' .card-action-btn:first-child');
  if(btn){btn.className='card-action-btn'+(likedVideos[id]?' liked':'');btn.innerHTML=SVG_HEART+' Like';}
};
window.toggleVormerken=function(id){
  vorgemerkteVideos[id]=!vorgemerkteVideos[id];
  if(!vorgemerkteVideos[id])delete vorgemerkteVideos[id];
  localStorage.setItem('t7_vormerken',JSON.stringify(vorgemerkteVideos));
  var btn=document.querySelector('#card-'+id+' .card-action-btn:last-child');
  if(btn){btn.className='card-action-btn'+(vorgemerkteVideos[id]?' vorgemerkt':'');btn.innerHTML=SVG_BELL+' Vormerken';}
};

var currentFilter='all',currentDiff='all',currentCat='all',currentPersonal='all';

function render(){
  var filtered=allVideos.filter(function(v){
    if(currentFilter!=='all'&&v.sevens!=currentFilter)return false;
    if(currentDiff!=='all'&&v.difficulty!==currentDiff)return false;
    if(currentPersonal==='liked'&&!likedVideos[v.id])return false;
    if(currentPersonal==='vorgemerkt'&&!vorgemerkteVideos[v.id])return false;
    if(currentCat!=='all'&&v.category!==currentCat)return false;
    if(currentSearch&&v.title_DE.toLowerCase().indexOf(currentSearch.toLowerCase())<0)return false;
    return true;
  });

  // Sort: first by category order, then by difficulty order within each category
  filtered.sort(function(a,b){
    var catA=CATEGORY_ORDER.indexOf(a.category);
    var catB=CATEGORY_ORDER.indexOf(b.category);
    // Unknown categories go to the end
    if(catA===-1)catA=999;
    if(catB===-1)catB=999;
    if(catA!==catB)return catA-catB;
    // Within same category, sort by difficulty
    var diffA=DIFF_ORDER.indexOf(a.difficulty);
    var diffB=DIFF_ORDER.indexOf(b.difficulty);
    if(diffA===-1)diffA=999;
    if(diffB===-1)diffB=999;
    return diffA-diffB;
  });

  window._filteredVideos=filtered;
  if(!filtered.length){document.getElementById('grid').innerHTML='<div class="no-results">Keine Videos gefunden.</div>';return;}

  function makeCard(v,i){
    var diff=diffClass(v.difficulty);
    var vimeoId=v.vimeo_code?v.vimeo_code.split('/')[0]:'';
    var thumbFile=vimeoId&&thumbnailIndex[vimeoId]?thumbnailIndex[vimeoId]:'';
    var thumbUrl=thumbFile?'https://ute-laureo.github.io/t7academy-widgets/Assets/thumbnails/'+thumbFile.replace(/ /g,'%20'):'';
    var liked=likedVideos[v.id]?true:false;
    var vorgemerkt=vorgemerkteVideos[v.id]?true:false;
    // Show Sevens count in card instead of category (category is now the group header)
    return '<div class="card" id="card-'+v.id+'">'+
      '<div class="card-thumb" onclick="openVideo('+i+')">'+
        (thumbUrl?'<img src="'+thumbUrl+'" alt="" onerror="this.remove()">':'')+
        '<div class="play-icon"></div>'+
      '</div>'+
      '<div class="card-title-bar" onclick="openVideo('+i+')">'+
        '<div class="card-title-row">'+
          '<div class="card-title">'+v.title_DE+'</div>'+
          (v.sevens?'<span class="card-cat">'+sevensLabel(v.sevens)+' '+v.sevens+' Seven'+(v.sevens>1?'s':'')+'</span>':'')+
        '</div>'+
        '<div class="card-sub">'+
          subtitleHTML(v,'card-subtitles')+
          (diff?'<span class="card-diff-inline '+diff+'">'+v.difficulty+'</span>':'')+
        '</div>'+
      '</div>'+
      '<div class="card-actions">'+
        '<button class="card-action-btn'+(liked?' liked':'')+'" onclick="toggleLike(\''+v.id+'\')">'+SVG_HEART+' Like</button>'+
        '<button class="card-action-btn'+(vorgemerkt?' vorgemerkt':'')+'" onclick="toggleVormerken(\''+v.id+'\')">'+SVG_BELL+' Vormerken</button>'+
      '</div>'+
    '</div>';
  }

  var html='';

  // Build groups by category in the specified order
  // Collect all categories present in filtered results, respecting CATEGORY_ORDER
  var presentCats=[];
  CATEGORY_ORDER.forEach(function(cat){
    if(filtered.some(function(v){return v.category===cat;})){
      presentCats.push(cat);
    }
  });
  // Also add any categories not in CATEGORY_ORDER (unknown ones) at the end
  filtered.forEach(function(v){
    if(v.category&&CATEGORY_ORDER.indexOf(v.category)===-1&&presentCats.indexOf(v.category)===-1){
      presentCats.push(v.category);
    }
  });

  presentCats.forEach(function(cat){
    var group=filtered.filter(function(v){return v.category===cat;});
    if(!group.length)return;
    html+='<div class="star-group">'+
      '<div class="star-group-title">'+
        '<span class="title-stars">⚽</span> '+(CATEGORY_DISPLAY[cat]||cat)+
      '</div>'+
      '<div class="star-group-grid">';
    group.forEach(function(v){html+=makeCard(v,filtered.indexOf(v));});
    html+='</div></div>';
  });

  document.getElementById('grid').innerHTML=html;
}

function updateAvailableOptions(){
  var sevens=allVideos.map(function(v){return v.sevens;});
  var diffs=allVideos.map(function(v){return v.difficulty;});
  // Build category list respecting CATEGORY_ORDER, then add any extras
  var rawCats=allVideos.map(function(v){return v.category;}).filter(function(c,i,a){return c&&a.indexOf(c)===i;});
  var cats=[];
  CATEGORY_ORDER.forEach(function(c){if(rawCats.indexOf(c)>=0)cats.push(c);});
  rawCats.forEach(function(c){if(cats.indexOf(c)===-1)cats.push(c);});

  var drop=document.getElementById('pillDrop2');
  drop.querySelectorAll('[data-cat]:not([data-cat="all"])').forEach(function(b){b.remove();});
  cats.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='pill-option';btn.dataset.cat=c;btn.textContent=c;drop.appendChild(btn);
  });
  document.querySelectorAll('#pillDrop1 .pill-option[data-sevens]').forEach(function(btn){
    var s=btn.dataset.sevens,d=btn.dataset.diff;
    if(s==='all'&&d==='all')return;
    var hasMatch=s!=='all'&&d==='all'?sevens.indexOf(parseInt(s))>=0:s==='all'&&d!=='all'?diffs.indexOf(d)>=0:false;
    btn.style.display=hasMatch?'':'none';
  });
  document.querySelectorAll('.pill-dropdown').forEach(function(drop){
    drop.querySelectorAll('.pill-divider').forEach(function(div){
      var next=div.nextElementSibling,allHidden=true;
      while(next&&!next.classList.contains('pill-divider')){if(next.style.display!=='none'){allHidden=false;break;}next=next.nextElementSibling;}
      div.style.display=allHidden?'none':'';
    });
  });
}

function setPillLabel(id,label,isDefault){
  var t=document.getElementById(id);
  t.innerHTML=label+' <span class="pill-arrow"></span>';
  t.classList.toggle('has-active',!isDefault);
}
function closePills(){document.querySelectorAll('.pill-wrap').forEach(function(w){w.classList.remove('open');});}
document.querySelectorAll('.pill-wrap').forEach(function(wrap){
  wrap.querySelector('.pill-toggle').addEventListener('click',function(e){
    e.stopPropagation();var wasOpen=wrap.classList.contains('open');closePills();if(!wasOpen)wrap.classList.add('open');
  });
});
document.addEventListener('click',function(){closePills();});
document.querySelectorAll('.pill-dropdown').forEach(function(d){d.addEventListener('click',function(e){e.stopPropagation();});});

document.getElementById('pillDrop1').addEventListener('click',function(e){
  var btn=e.target.closest('.pill-option');if(!btn)return;
  document.querySelectorAll('#pillDrop1 .pill-option').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');currentFilter=btn.dataset.sevens;currentDiff=btn.dataset.diff;
  var isDefault=currentFilter==='all'&&currentDiff==='all';
  setPillLabel('pillToggle1',isDefault?'Schwierigkeitsgrad':btn.textContent.trim(),isDefault);
  closePills();render();
});
document.getElementById('pillDrop2').addEventListener('click',function(e){
  var btn=e.target.closest('.pill-option');if(!btn)return;
  document.querySelectorAll('#pillDrop2 .pill-option').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');currentCat=btn.dataset.cat;
  setPillLabel('pillToggle2',currentCat==='all'?'Kategorien':btn.textContent.trim(),currentCat==='all');
  closePills();render();
});
document.getElementById('pillDrop3').addEventListener('click',function(e){
  var btn=e.target.closest('.pill-option');if(!btn)return;
  document.querySelectorAll('#pillDrop3 .pill-option').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');currentPersonal=btn.dataset.personal;
  var isDefault=currentPersonal==='all';
  var toggle=document.getElementById('pillToggle3');
  toggle.innerHTML=(isDefault?'Persönliche Filter':btn.textContent.trim())+' <span class="pill-arrow"></span>';
  toggle.classList.remove('has-active','has-personal');
  if(!isDefault)toggle.classList.add('has-personal');
  closePills();render();
});
document.getElementById('searchInput').addEventListener('input',function(){currentSearch=this.value;render();});

window.openVideo=function(idx){
  var v=(window._filteredVideos||allVideos)[idx];if(!v)return;
  var modal=document.getElementById('modal');
  document.getElementById('modalTitle').textContent=v.title_DE;
  // so_what → ultimate_goal row under the title
  var subsEl=document.getElementById('modalSubtitles');
  var swM=firstOf(v.so_what),ugM=firstOf(v.ultimate_goal);
  if(swM||ugM){
    var sp='';
    if(swM)sp+='<span class="vsub-so-what">'+swM+'</span>';
    if(swM)if(ugM)sp+='<span class="vsub-arrow" aria-hidden="true">→</span>';
    if(ugM)sp+='<span class="vsub-goal">'+ugM+'</span>';
    subsEl.innerHTML=sp;
    subsEl.style.display='';
  }else{
    subsEl.innerHTML='';
    subsEl.style.display='none';
  }
  var videoEl=document.getElementById('modalVideo');
  if(v.vimeo_code){
    var parts=v.vimeo_code.split('/');
    videoEl.innerHTML='<iframe src="https://player.vimeo.com/video/'+parts[0]+(parts[1]?'?h='+parts[1]:'')+'" allow="autoplay; fullscreen" allowfullscreen></iframe>';
    videoEl.style.display='block';
  }else{videoEl.style.display='none';videoEl.innerHTML='';}
  var meta='';
  if(v.sevens)meta+='<span class="meta-tag meta-stars">'+sevensLabel(v.sevens)+' '+v.sevens+' Seven'+(v.sevens>1?'s':'')+'</span>';
  if(v.category)meta+='<span class="meta-tag meta-cat">'+v.category+'</span>';
  if(v.difficulty)meta+='<span class="meta-tag meta-diff">'+v.difficulty+'</span>';
  document.getElementById('modalMeta').innerHTML=meta;
  var descEl=document.getElementById('modalDesc');
  if(v.description){
    try{
      var steps=typeof v.description==='string'?JSON.parse(v.description):v.description;
      if(Array.isArray(steps)&&steps.length){
        descEl.innerHTML='<div class="desc-section"><div class="desc-title">Ablauf</div><ul class="desc-list">'+steps.map(function(s){return '<li>'+s+'</li>';}).join('')+'</ul></div>';
      }else{descEl.innerHTML='';}
    }catch(e){descEl.innerHTML='';}
  }else{descEl.innerHTML='';}
  modal.classList.add('open');modal.scrollTop=0;document.body.style.overflow='hidden';
};
document.getElementById('modalBack').onclick=function(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modalVideo').innerHTML='';
  document.body.style.overflow='';
};

// Admin bar detection
var adminBar=document.getElementById('wpadminbar');
var nav=document.querySelector('.topnav');
function updateNavTop(){nav.style.top=adminBar?adminBar.offsetHeight+'px':'0px';}
updateNavTop();
window.addEventListener('resize',updateNavTop);
window.addEventListener('scroll',function(){
  var nav=document.querySelector('.topnav');
  if(window.scrollY>40){nav.classList.add('nav-shrunk');}
  else{nav.classList.remove('nav-shrunk');}
});
})();
</script>
